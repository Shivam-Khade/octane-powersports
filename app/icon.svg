<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Vibrant Neon Orange to Red Gradient -->
    <linearGradient id="neonOrange" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF2A00" />
      <stop offset="50%" stop-color="#FF5E00" />
      <stop offset="100%" stop-color="#FFA200" />
    </linearGradient>

    <!-- Deep Metallic Gradient -->
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a8a8a" />
      <stop offset="50%" stop-color="#4a4a4a" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </linearGradient>

    <!-- Drop Shadow for 3D Premium Effect -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Tilt slightly for a fast, dynamic racing look -->
  <g transform="rotate(10 50 50)" filter="url(#shadow)">
    <!-- Base thick tire/metallic ring - scaled to the absolute edges (radius 44 + stroke 12 = 100 width) -->
    <circle cx="50" cy="50" r="44" fill="none" stroke="url(#metal)" stroke-width="12" />
    
    <!-- Neon Orange Speed Sweep -->
    <circle cx="50" cy="50" r="44" fill="none" stroke="url(#neonOrange)" stroke-width="12" stroke-dasharray="160 276.4" stroke-linecap="round" transform="rotate(130 50 50)" />
    
    <!-- Inner complex hub/needle design -->
    <polygon points="45,50 55,50 50,12" fill="url(#neonOrange)" transform="rotate(65 50 50)" />
    <circle cx="50" cy="50" r="10" fill="url(#metal)" />
    <circle cx="50" cy="50" r="4" fill="#ffffff" />
  </g>
</svg>
